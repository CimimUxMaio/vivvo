name: Deploy

on:
  # Trigger 1: Auto-deploy to testing after successful CI on main
  workflow_run:
    workflows: ["CI"]
    types: [completed]

  # Trigger 2: Manual dispatch with environment selection
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'testing'
        type: choice
        options:
          - testing
          - production

  # Trigger 3: Auto-deploy to production on release
  release:
    types: [published]

concurrency:
  group: deploy-${{ github.event.inputs.environment || (github.event_name == 'release' && 'production') || 'testing' }}
  cancel-in-progress: true

env:
  ENVIRONMENT: ${{ github.event.inputs.environment || (github.event_name == 'release' && 'production') || 'testing' }}
  IMAGE_NAME: vivvo

jobs:
  deploy:
    # Conditional logic:
    # - For workflow_run: only run if CI was successful and on main branch push
    # - Always run for release trigger
    # - Always run for workflow_dispatch (validation happens in a dedicated step)
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.event == 'push') ||
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch'

    runs-on: ubuntu-latest

    # Set the GitHub Environment for proper secret/variable scoping
    environment: ${{ env.ENVIRONMENT }}

    steps:
      - name: Setup useful variables
        id: setup

        env:
          TRIGGER: ${{ github.event_name }}

        run: |
          if [ "$TRIGGER" = "workflow_run" ]; then
            # For auto-deploy after CI, use the commit SHA
            REF="${{ github.event.workflow_run.head_sha }}"
          else
            # For manual dispatch and releases, use github.ref
            REF="${{ github.ref }}"
          fi

          if [[ "${{ env.ENVIRONMENT }}" == "production" ]] && ! [[ "$REF" == refs/tags/* ]]; then
              echo "❌ Invalid production ref: $REF"
              echo "   Ref should be a GitHub tag."
              exit 1
          fi

          if [[ "${{ env.ENVIRONMENT }}" == "production" ]]; then
            IMAGE_TAG="${REF#refs/tags/}"

            if [[ -z "$IMAGE_TAG" ]]; then
              echo "❌ Invalid Docker image tag derived from ref: $REF"
              echo "   Tag name cannot be empty."
              exit 1
            fi

            if [[ "$IMAGE_TAG" == *"/"* ]]; then
              echo "❌ Invalid Docker image tag derived from ref: $REF"
              echo "   Docker tags must not contain '/'."
              exit 1
            fi

            if ! [[ "$IMAGE_TAG" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
              echo "❌ Invalid Docker image tag derived from ref: $REF"
              echo "   Tag '$IMAGE_TAG' must match ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$"
              exit 1
            fi
          else
            IMAGE_TAG="testing"
          fi

          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

          echo "🎯 Trigger: $TRIGGER"
          echo "📋 Ref: $REF"
          echo "📦 Image tag: $IMAGE_TAG"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.setup.outputs.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.setup.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_CLIENT_SECRET }}
          tags: tag:ci
          version: latest

      - name: Trigger Deployment
        env:
          APP_NAME: ${{ vars.APP_NAME }}
          APP_PORT: ${{ vars.APP_PORT }}
          PHX_HOST: ${{ vars.PHX_HOST }}
          SSH_HOST: ${{ vars.SERVER_TAILSCALE_HOST }}
          SSH_USER: ${{ vars.SERVER_USER }}
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.setup.outputs.image_tag }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          MAIL_USER: ${{ vars.MAIL_USER }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          REF: ${{ steps.setup.outputs.ref }}
        run: |
          tailscale ssh "$SSH_USER@$SSH_HOST" << EOF
            export APP_NAME="$APP_NAME"
            export APP_PORT="$APP_PORT"
            export IMAGE="$IMAGE"
            export POSTGRES_USER="$POSTGRES_USER"
            export POSTGRES_PASSWORD="$POSTGRES_PASSWORD"
            export POSTGRES_DB="$POSTGRES_DB"
            export DATABASE_URL="ecto://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}"
            export SECRET_KEY_BASE="$SECRET_KEY_BASE"
            export PHX_HOST="$PHX_HOST"
            export MAIL_USER="$MAIL_USER"
            export MAIL_PASSWORD="$MAIL_PASSWORD"

            echo "📥 Pulling latest repository..."
            cd "\$HOME/apps/$APP_NAME/"
            git fetch origin --prune
            git fetch origin --tags --force

            if [[ "$REF" == refs/heads/* ]]; then
              BRANCH="${REF#refs/heads/}"
              echo "📋 Checking out branch from origin: $BRANCH"
              git checkout --force -B "$BRANCH" "origin/$BRANCH"
            else
              echo "📋 Checking out ref: $REF"
              git checkout --force "$REF"
            fi

            cd deploy/

            if [ "${{ env.ENVIRONMENT }}" = "production" ]; then
              make deploy.production
            else
              make deploy.testing
            fi
          EOF

      - name: Deployment Summary
        run: |
          echo "✅ Deployment completed successfully"
          echo "Environment: ${{ env.ENVIRONMENT }}"
          echo "Image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.setup.outputs.image_tag }}"
