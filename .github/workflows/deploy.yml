name: Deploy

on:
  # Trigger 1: Auto-deploy to testing after successful CI on main
  workflow_run:
    workflows: ["CI"]
    types: [completed]

  # Trigger 2: Manual dispatch with environment selection
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'testing'
        type: choice
        options:
          - testing
          - production
      ref:
        description: 'Branch or tag to deploy'
        required: true
        default: 'main'

  # Trigger 3: Auto-deploy to production on release
  release:
    types: [published]

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'testing' }}
  cancel-in-progress: true

env:
  IMAGE_NAME: vivvo
  # IMAGE_TAG logic: testing always "testing", production uses the tag/branch name
  IMAGE_TAG: ${{ (github.event_name == 'release' || github.event.inputs.environment == 'production') && github.ref_name || 'testing' }}

jobs:
  deploy:
    # Conditional logic:
    # - Always run for workflow_run (CI success trigger)
    # - Always run for release trigger
    # - For workflow_dispatch:
    #   - Always run if environment is testing
    #   - Only run if environment is production AND ref is a tag
    if: |
      github.event_name == 'workflow_run' ||
      github.event_name == 'release' ||
      (github.event.inputs.environment == 'testing') ||
      (github.event.inputs.environment == 'production' && startsWith(github.ref, 'refs/tags/'))

    runs-on: ubuntu-latest
    
    # Set the GitHub Environment for proper secret/variable scoping
    environment: ${{ github.event.inputs.environment || (github.event_name == 'release' && 'production') || 'testing' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Validate production deployment is a tag
        if: github.event.inputs.environment == 'production' && !startsWith(github.ref, 'refs/tags/')
        run: |
          echo "❌ Production deployments must use a release tag"
          exit 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_CLIENT_SECRET }}
          tags: tag:ci
          version: latest

      - name: Trigger Deployment
        env:
          APP_NAME: ${{ vars.APP_NAME }}
          APP_PORT: ${{ vars.APP_PORT }}
          PHX_HOST: ${{ vars.PHX_HOST }}
          SSH_HOST: ${{ vars.SERVER_TAILSCALE_HOST }}
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          MAIL_USER: ${{ vars.MAIL_USER }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          TARGET_BRANCH: ${{ github.event.inputs.ref || github.ref_name }}
          DEPLOY_ENV: ${{ github.event.inputs.environment || (github.event_name == 'release' && 'production') || 'testing' }}
        run: |
          tailscale ssh "$SSH_HOST" << EOF
            export APP_NAME="$APP_NAME"
            export APP_PORT="$APP_PORT"
            export IMAGE="$IMAGE"
            export POSTGRES_USER="$POSTGRES_USER"
            export POSTGRES_PASSWORD="$POSTGRES_PASSWORD"
            export POSTGRES_DB="$POSTGRES_DB"
            export DATABASE_URL="ecto://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}"
            export SECRET_KEY_BASE="$SECRET_KEY_BASE"
            export PHX_HOST="$PHX_HOST"
            export MAIL_USER="$MAIL_USER"
            export MAIL_PASSWORD="$MAIL_PASSWORD"

            echo "📥 Pulling latest repository..."
            cd "apps/$APP_NAME/"
            git fetch origin "$TARGET_BRANCH"
            git checkout --force "$TARGET_BRANCH"
            git reset --hard "origin/$TARGET_BRANCH"

            cd deploy/
            
            if [ "$DEPLOY_ENV" = "production" ]; then
              make deploy.production
            else
              make deploy.testing
            fi
          EOF

      - name: Deployment Summary
        run: |
          echo "✅ Deployment completed successfully"
          echo "Environment: ${{ github.event.inputs.environment || (github.event_name == 'release' && 'production') || 'testing' }}"
          echo "Image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
