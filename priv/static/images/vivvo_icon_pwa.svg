<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" fill="none">
  <style>
    /* Light theme colors (default) */
    .bg-circle { fill: #fafafa; }
    .v-shape { fill: #f97316; }
    .v-bar { fill: #fb923c; }
    .dot-1 { fill: #3b82f6; }
    .dot-2 { fill: #22c55e; }
    .dot-3 { fill: #8b5cf6; }

    /* Dark theme colors */
    @media (prefers-color-scheme: dark) {
      .bg-circle { fill: #292F37; }
      .v-shape { fill: #7c6ef5; }
      .v-bar { fill: #9b8eff; }
      .dot-1 { fill: #4facfe; }
      .dot-2 { fill: #43e97b; }
      .dot-3 { fill: #a78bfa; }
    }
  </style>

  <!-- Background circle -->
  <circle cx="30" cy="30" r="25" class="bg-circle"/>

  <!-- Scaled content group (85% scale, centered) -->
  <g transform="translate(4.5, 4.5) scale(0.85)">
    <!-- The V shape forming house roof -->
    <path d="M30 10L12 36H20L30 22L40 36H48L30 10Z" class="v-shape"/>

    <!-- Vertical bar representing building/foundation -->
    <rect x="26" y="26" width="8" height="16" rx="1" class="v-bar"/>

    <!-- Three dots at the base representing the three roles -->
    <circle cx="18" cy="48" r="2.5" class="dot-1"/>
    <circle cx="30" cy="48" r="2.5" class="dot-2"/>
    <circle cx="42" cy="48" r="2.5" class="dot-3"/>
  </g>
</svg>
