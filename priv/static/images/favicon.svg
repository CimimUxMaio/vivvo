<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" fill="none">
  <!-- VIVVO Favicon - Adaptive Theme (without background circle) -->

  <style>
    .icon-light {
      display: block;
    }
    .icon-dark {
      display: none;
    }

    @media (prefers-color-scheme: dark) {
      .icon-light {
        display: none;
      }
      .icon-dark {
        display: block;
      }
    }
  </style>

  <!-- Light Theme Icon (shown in light mode) - Orange/Coral colors -->
  <g class="icon-light">
    <!-- The V shape forming house roof - using light theme primary orange/coral -->
    <path d="M30 10L12 36H20L30 22L40 36H48L30 10Z" fill="#f97316"/>

    <!-- Vertical bar representing building/foundation - slightly lighter orange -->
    <rect x="26" y="26" width="8" height="16" rx="1" fill="#fb923c"/>

    <!-- Three dots at the base representing the three roles -->
    <circle cx="18" cy="48" r="2.5" fill="#3b82f6"/>
    <circle cx="30" cy="48" r="2.5" fill="#22c55e"/>
    <circle cx="42" cy="48" r="2.5" fill="#8b5cf6"/>
  </g>

  <!-- Dark Theme Icon (shown in dark mode) - Purple colors -->
  <g class="icon-dark">
    <!-- The V shape forming house roof - using dark theme primary purple -->
    <path d="M30 10L12 36H20L30 22L40 36H48L30 10Z" fill="#7c6ef5"/>

    <!-- Vertical bar representing building/foundation - slightly lighter purple -->
    <rect x="26" y="26" width="8" height="16" rx="1" fill="#9b8eff"/>

    <!-- Three dots at the base representing the three roles -->
    <circle cx="18" cy="48" r="2.5" fill="#4facfe"/>
    <circle cx="30" cy="48" r="2.5" fill="#43e97b"/>
    <circle cx="42" cy="48" r="2.5" fill="#a78bfa"/>
  </g>

  <defs>
    <!-- Gradient for the V shape using primary orange tones (light theme) -->
    <linearGradient id="vGradientLight" x1="12" y1="10" x2="48" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>

    <!-- Gradient for the V shape using primary purple tones (dark theme) -->
    <linearGradient id="vGradientDark" x1="12" y1="10" x2="48" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9b8eff"/>
      <stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
  </defs>
</svg>
