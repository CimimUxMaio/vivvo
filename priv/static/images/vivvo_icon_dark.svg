<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" fill="none">
  <!-- VIVVO Logo - Dark Theme (with padding) -->
  
  <!-- Background circle using dark theme base-100 - reduced radius for padding -->
  <circle cx="30" cy="30" r="25" fill="#292F37"/>
  
  <!-- Scaled content group (85% scale, centered) -->
  <g transform="translate(4.5, 4.5) scale(0.85)">
    <!-- The V shape forming house roof - using dark theme primary purple -->
    <path d="M30 10L12 36H20L30 22L40 36H48L30 10Z" fill="#7c6ef5"/>

    <!-- Vertical bar representing building/foundation - slightly lighter purple -->
    <rect x="26" y="26" width="8" height="16" rx="1" fill="#9b8eff"/>

    <!-- Three dots at the base representing the three roles -->
    <circle cx="18" cy="48" r="2.5" fill="#4facfe"/>
    <circle cx="30" cy="48" r="2.5" fill="#43e97b"/>
    <circle cx="42" cy="48" r="2.5" fill="#a78bfa"/>
  </g>
  
  <defs>
    <!-- Gradient for the V shape using primary purple tones -->
    <linearGradient id="vGradientDark" x1="12" y1="10" x2="48" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9b8eff"/>
      <stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
  </defs>
</svg>
